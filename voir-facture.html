<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarElec — Aperçu facture</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ══ APERÇU PDF ══ — même style que voir.html */
    .pdf-wrap { background: #e8e8e8; padding: 24px; border-radius: var(--radius-lg); }
    .pdf-page {
      background: #fff; width: 100%; max-width: 794px; margin: 0 auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      font-family: Helvetica, Arial, sans-serif; font-size: 11px; color: #1A1A1A;
      padding: 0; overflow: hidden;
    }
    .pdf-header { display:flex; align-items:center; justify-content:space-between; padding:18px 20px; background:#fff; }
    .pdf-header-logo img { height:50px; width:auto; }
    .pdf-header-logo .logo-placeholder { font-size:20px; font-weight:700; color:#0F1820; letter-spacing:1px; }
    .pdf-header-right { text-align:right; }
    .pdf-titre { font-size:26px; font-weight:700; color:#0F1820; line-height:1; }
    .pdf-num   { font-size:11px; color:#666; margin-top:4px; }
    .pdf-rouge-line { height:3px; background:#961414; }
    .pdf-info-band { display:grid; grid-template-columns:repeat(4,1fr); background:#F2F2F2; border-bottom:1px solid #D0D0D0; }
    .pdf-info-cell { padding:7px 10px; font-size:9px; border-right:1px solid #D0D0D0; }
    .pdf-info-cell:last-child { border-right:none; }
    .pdf-info-cell strong { display:block; color:#1A1A1A; font-size:9.5px; }
    .pdf-parties { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:14px 20px; }
    .pdf-partie { border:1px solid #D0D0D0; overflow:hidden; border-radius:4px; }
    .pdf-partie-header { background:#4A4A4A; color:#fff; font-size:9px; font-weight:700; padding:5px 8px; border-bottom:2px solid #961414; text-transform:uppercase; letter-spacing:0.5px; }
    .pdf-partie-body { padding:8px; background:#F2F2F2; font-size:10px; line-height:1.7; }
    .pdf-partie-body strong { font-size:10.5px; }
    .pdf-fiscal { padding:4px 20px; font-size:8.5px; color:#666; font-style:italic; }
    .pdf-objet { margin:0 20px 10px; background:#F5E8E8; border:1px solid #D0D0D0; border-bottom:2px solid #961414; padding:6px 10px; font-size:10px; }
    .pdf-table-wrap { padding:0 20px 14px; }
    .pdf-table { width:100%; border-collapse:collapse; font-size:10px; }
    .pdf-table thead th { background:#4A4A4A; color:#fff; padding:7px 8px; text-align:left; font-size:9.5px; font-weight:700; border-bottom:2px solid #961414; }
    .pdf-table thead th:last-child, .pdf-table thead th:nth-last-child(2) { text-align:right; }
    .pdf-table tbody tr:nth-child(odd)  { background:#fff; }
    .pdf-table tbody tr:nth-child(even) { background:#F2F2F2; }
    .pdf-table tbody td { padding:6px 8px; border-bottom:1px solid #D0D0D0; vertical-align:top; }
    .pdf-table tbody td:last-child, .pdf-table tbody td:nth-last-child(2) { text-align:right; }
    .pdf-table .td-desc { font-size:9px; color:#666; margin-top:2px; }
    .pdf-totaux-wrap { display:flex; justify-content:flex-end; padding:0 20px 14px; gap:16px; align-items:start; }
    .pdf-conditions { flex:1; font-size:9px; color:#444; line-height:1.6; }
    .pdf-conditions strong { color:#961414; font-size:9.5px; }
    .pdf-totaux { min-width:240px; border:1px solid #D0D0D0; overflow:hidden; }
    .pdf-tot-row { display:flex; justify-content:space-between; padding:5px 10px; font-size:10px; border-bottom:1px solid #D0D0D0; }
    .pdf-tot-row:last-child { border-bottom:none; }
    .pdf-tot-row.final { background:#0F1820; color:#fff; font-weight:700; font-size:11px; border-top:2px solid #961414; }
    .pdf-reglement { display:grid; grid-template-columns:1fr 1fr; margin:0 20px 14px; border:1px solid #D0D0D0; overflow:hidden; }
    .pdf-reglement-cell { padding:8px 10px; font-size:9.5px; line-height:1.7; }
    .pdf-reglement-cell:first-child { border-right:1px solid #D0D0D0; }
    .pdf-reglement-header { background:#F2F2F2; font-weight:700; font-size:9px; padding:5px 10px; border-bottom:2px solid #961414; text-transform:uppercase; }
    .pdf-footer-line { height:2px; background:#961414; margin:0 20px; }
    .pdf-footer-text { padding:6px 20px 12px; font-size:7.5px; color:#666; text-align:center; }

    /* ══ IMPRESSION ══ */
    @media print {
      .sidebar, .topbar, .action-bar, .toast-container, #overlay { display:none !important; }
      body, .app-layout, .main-content, .page-content {
        background:#fff !important; padding:0 !important; margin:0 !important;
      }
      .pdf-wrap { background:#fff !important; padding:0 !important; border-radius:0 !important; }
      .pdf-page { max-width:100% !important; box-shadow:none !important; page-break-after:always; }
    }
  </style>
</head>
<body>

<div class="app-layout">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <a href="index.html" class="sidebar-logo">
      <img src="assets/logo.png" alt="StarElec" onerror="this.style.display='none'" />
      <div>
        <span id="sidebar-title">StarElec</span>
        <span class="logo-sub">Devis &amp; Factures</span>
      </div>
    </a>
    <div class="nav-section">Principal</div>
    <a href="index.html"   class="nav-item"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
    <a href="devis.html"   class="nav-item"><i class="ti ti-plus"></i> Nouveau devis</a>
    <a href="clients.html" class="nav-item"><i class="ti ti-users"></i> Clients</a>
    <div class="nav-section">Gestion</div>
    <a href="liste.html"    class="nav-item"><i class="ti ti-file-text"></i> Tous les devis</a>
    <a href="factures.html" class="nav-item active"><i class="ti ti-receipt"></i> Factures</a>
    <a href="catalogue.html" class="nav-item"><i class="ti ti-list-check"></i> Catalogue</a>
    <div class="nav-section">Compte</div>
    <a href="reglages.html" class="nav-item"><i class="ti ti-settings"></i> Réglages</a>
    <div class="sidebar-bottom">
      <a href="reglages.html" class="sidebar-user">
        <div class="avatar" id="sidebar-avatar">SE</div>
        <div>
          <div class="sidebar-user-name" id="sidebar-nom">StarElec</div>
          <div class="sidebar-user-role" id="sidebar-ville">Chargement...</div>
        </div>
      </a>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main-content">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <a href="factures.html" class="btn btn-ghost btn-sm"><i class="ti ti-arrow-left"></i> Retour</a>
        <span class="topbar-breadcrumb">Factures / <span id="topbar-num">—</span></span>
      </div>
      <div class="topbar-right">
        <select class="badge badge-select" id="statut-select" onchange="changerStatut(this.value, this)">
          <option value="Créé">Créé</option>
          <option value="Envoyé">Envoyé</option>
          <option value="Payé">Payé</option>
          <option value="Payé en partie">Payé en partie</option>
          <option value="Annulé">Annulé</option>
        </select>
      </div>
    </div>

    <!-- Barre d'actions -->
    <div class="action-bar">
      <button class="btn btn-ghost btn-sm" onclick="envoyerMail()"><i class="ti ti-mail"></i> Envoyer</button>

      <div class="dropdown">
        <button class="btn btn-ghost btn-sm" onclick="toggleDropdown(this)">
          <i class="ti ti-printer"></i> Imprimer <i class="ti ti-chevron-down"></i>
        </button>
        <div class="dropdown-menu">
          <div class="dropdown-item" onclick="window.print()"><i class="ti ti-printer"></i> Imprimer</div>
          <div class="dropdown-item" onclick="telechargerPDF()"><i class="ti ti-file-type-pdf"></i> Télécharger PDF</div>
        </div>
      </div>

      <div class="separator"></div>
      <button class="btn btn-ghost btn-sm danger" onclick="supprimerFacture()">
        <i class="ti ti-trash"></i> Supprimer
      </button>
    </div>

    <!-- Contenu -->
    <div class="page-content">
      <div class="pdf-wrap">
        <div class="pdf-page" id="pdf-page">
          <div style="padding:40px;text-align:center;color:#999"><i class="ti ti-loader" style="font-size:32px"></i><br/>Chargement...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast-container" id="toasts"></div>
<div id="overlay" style="display:none;position:fixed;inset:0;z-index:199;" onclick="closeAllDropdowns()"></div>

<script src="app.js"></script>
<script>
let factureId = null;
let facture   = null;
let cfg       = null;   // Config entreprise depuis Supabase

document.addEventListener('DOMContentLoaded', async () => {
  const id     = getUrlParam('id');
  const action = getUrlParam('action');

  if (!id) { window.location.href = 'factures.html'; return; }

  factureId = id;

  // Chargement en parallèle depuis Supabase
  const [allFact, cfgFull] = await Promise.all([DB.getFactures(), DB.getConfig()]);
  facture = allFact.find(f => f.id === id) || null;
  cfg     = cfgFull.entreprise;

  if (!facture) { toast('Facture introuvable', 'error'); return; }

  // Topbar
  document.getElementById('topbar-num').textContent = facture.numero || '—';
  document.title = `StarElec — ${facture.numero || 'Facture'}`;

  // Statut select
  const sel = document.getElementById('statut-select');
  sel.value = facture.statut || 'Créé';
  sel.className = `badge badge-select ${getBadgeClass(facture.statut)}`;

  // Sidebar dynamique depuis config Supabase
  const nomEntreprise = cfg.nom || 'StarElec';
  const initiales = nomEntreprise.replace(/[^A-Z]/g, '').slice(0, 2) || nomEntreprise.slice(0, 2).toUpperCase();
  document.getElementById('sidebar-title').textContent  = nomEntreprise;
  document.getElementById('sidebar-avatar').textContent = initiales;
  document.getElementById('sidebar-nom').textContent    = nomEntreprise;
  document.getElementById('sidebar-ville').textContent  = cfg.ville ? `${nomEntreprise} — ${cfg.ville}` : nomEntreprise;

  // Render
  renderPDF();

  // Actions auto
  if (action === 'envoyer') envoyerMail();
  if (getUrlParam('print') === '1') {
    setTimeout(() => window.print(), 700);
  }
});

// ══ RENDER PDF ══
function renderPDF() {
  const f = facture;
  const e = cfg;

  const montant_ht = parseFloat(f.montant_ht || f.montant || 0);
  const acompte    = f.type?.includes('acompte') && f.acompte_pct
                       ? Math.round(montant_ht * (f.acompte_pct / 100) * 100) / 100
                       : null;

  // Titre du document
  let titreDoc = 'FACTURE';
  if (f.type === "Facture d'acompte") titreDoc = "FACTURE D'ACOMPTE";
  else if (f.type === 'Avoir')        titreDoc = 'AVOIR';

  // Adresse client
  const clientAdresse = [
    f.client_adresse,
    (f.client_cp || f.client_ville) ? `${f.client_cp || ''} ${f.client_ville || ''}`.trim() : '',
  ].filter(Boolean).join('<br/>');

  // Lignes
  const lignesHTML = (f.lignes || []).map((l, i) => {
    if (l.type === 'soustotal') return `<tr><td colspan="5" style="font-weight:700;text-align:right;padding:6px 8px;background:#e8e8e8">Sous-total</td><td style="text-align:right;font-weight:700;padding:6px 8px;background:#e8e8e8">${fmt(l.total||0)}</td></tr>`;
    if (l.type === 'texte')    return `<tr><td colspan="6" style="padding:6px 8px;color:#444;font-style:italic">${l.designation||''}</td></tr>`;
    return `
      <tr>
        <td style="width:28px;text-align:center;color:#888">${i+1}</td>
        <td>
          <strong>${l.designation || ''}</strong>
          ${l.description ? `<div class="td-desc">${l.description}</div>` : ''}
        </td>
        <td style="text-align:center;width:50px">${l.qte ?? ''}</td>
        <td style="text-align:right;width:50px">${l.unite || 'u'}</td>
        <td style="text-align:right;width:80px">${fmt(l.pu || 0)}</td>
        <td style="text-align:right;width:90px;font-weight:600">${fmt(l.total || 0)}</td>
      </tr>`;
  }).join('');

  document.getElementById('pdf-page').innerHTML = `

    <!-- EN-TÊTE -->
    <div class="pdf-header">
      <div class="pdf-header-logo">
        <img src="assets/logo.png" alt="${e.nom}"
             onerror="this.outerHTML='<div class=\\'logo-placeholder\\'>${e.nom || 'StarElec'}</div>'" />
      </div>
      <div class="pdf-header-right">
        <div class="pdf-titre">${titreDoc}</div>
        <div class="pdf-num">N° ${f.numero || ''}</div>
      </div>
    </div>
    <div class="pdf-rouge-line"></div>

    <!-- BANDE INFOS -->
    <div class="pdf-info-band">
      <div class="pdf-info-cell">
        <span style="color:#666">Date :</span>
        <strong>${fmtDate(f.date || f.created_at)}</strong>
      </div>
      <div class="pdf-info-cell">
        <span style="color:#666">Échéance :</span>
        <strong>${f.date_echeance ? fmtDate(f.date_echeance) : '—'}</strong>
      </div>
      <div class="pdf-info-cell">
        <span style="color:#666">Règlement :</span>
        <strong>${f.mode_reglement || 'Virement bancaire'}</strong>
      </div>
      <div class="pdf-info-cell">
        <span style="color:#666">Devis lié :</span>
        <strong>${f.devis_numero || '—'}</strong>
      </div>
    </div>

    <!-- ÉMETTEUR / CLIENT -->
    <div class="pdf-parties">
      <div class="pdf-partie">
        <div class="pdf-partie-header">Émetteur</div>
        <div class="pdf-partie-body">
          <strong>${e.nom || ''}</strong><br/>
          ${e.adresse || ''}<br/>
          ${e.cp || ''} ${e.ville || ''}, ${e.pays || 'France'}<br/>
          ${e.siret ? `SIRET ${e.siret}<br/>` : ''}
          ${e.iban ? `IBAN : ${e.iban}` : ''}
          ${e.banque ? ` — ${e.banque}` : ''}
        </div>
      </div>
      <div class="pdf-partie">
        <div class="pdf-partie-header">Client</div>
        <div class="pdf-partie-body">
          <strong>${f.client || ''}</strong><br/>
          ${clientAdresse ? clientAdresse + '<br/>' : ''}
          ${f.client_email ? f.client_email + '<br/>' : ''}
          ${f.client_tel ? f.client_tel : ''}
        </div>
      </div>
    </div>

    <!-- MENTION TVA -->
    <div class="pdf-fiscal">${e.tva_msg || 'TVA non applicable, art. 293B du CGI'}</div>

    <!-- OBJET -->
    ${(f.objet || f.titre) ? `<div class="pdf-objet"><strong>Objet :</strong> ${f.objet || f.titre}</div>` : ''}

    <!-- TABLEAU DES PRESTATIONS -->
    <div class="pdf-table-wrap">
      <table class="pdf-table">
        <thead>
          <tr>
            <th style="width:28px">N°</th>
            <th>DÉSIGNATION</th>
            <th style="width:50px;text-align:center">QTÉ</th>
            <th style="width:50px;text-align:right">UNITÉ</th>
            <th style="width:80px;text-align:right">PU HT (€)</th>
            <th style="width:90px;text-align:right">TOTAL HT (€)</th>
          </tr>
        </thead>
        <tbody>
          ${lignesHTML || `<tr><td colspan="6" style="text-align:center;padding:16px;color:#999">Aucune prestation renseignée</td></tr>`}
        </tbody>
      </table>
    </div>

    <!-- TOTAUX -->
    <div class="pdf-totaux-wrap">
      <div class="pdf-conditions">
        ${f.notes ? `<strong>Notes :</strong><br/>${f.notes}` : ''}
      </div>
      <div class="pdf-totaux">
        <div class="pdf-tot-row">
          <label>Total HT</label>
          <span>${fmt(montant_ht)}</span>
        </div>
        ${acompte !== null ? `
        <div class="pdf-tot-row">
          <label>Acompte (${f.acompte_pct}%)</label>
          <span>${fmt(acompte)}</span>
        </div>` : ''}
        <div class="pdf-tot-row final">
          <label>TOTAL À PAYER</label>
          <span>${fmt(acompte !== null ? acompte : montant_ht)}</span>
        </div>
      </div>
    </div>

    <!-- RÈGLEMENT / COORDONNÉES BANCAIRES -->
    <div class="pdf-reglement">
      <div>
        <div class="pdf-reglement-header">Modalités de règlement</div>
        <div class="pdf-reglement-cell">
          Mode : ${f.mode_reglement || 'Virement bancaire'}<br/>
          Échéance : ${f.date_echeance ? fmtDate(f.date_echeance) : '—'}<br/>
          Merci d'indiquer le n° de facture en référence.
        </div>
      </div>
      <div>
        <div class="pdf-reglement-header">Coordonnées bancaires</div>
        <div class="pdf-reglement-cell">
          ${e.banque ? `Banque : ${e.banque}<br/>` : ''}
          ${e.bic   ? `BIC : ${e.bic}<br/>`   : ''}
          ${e.iban  ? `IBAN : ${e.iban}`       : ''}
        </div>
      </div>
    </div>

    <!-- PIED DE PAGE -->
    <div class="pdf-footer-line"></div>
    <div class="pdf-footer-text">
      ${e.nom || ''} — ${e.adresse || ''}, ${e.cp || ''} ${e.ville || ''}
      ${e.siret ? ` — SIRET ${e.siret}` : ''}
      ${e.email ? ` — ${e.email}` : ''}
      ${e.tel   ? ` — ${e.tel}`   : ''}
      — ${e.tva_msg || 'TVA non applicable, art. 293B du CGI'}
    </div>
  `;
}

// ══ ACTIONS ══
async function changerStatut(statut, sel) {
  try {
    await DB.updateFacture(factureId, { statut });
    sel.className = `badge badge-select ${getBadgeClass(statut)}`;
    facture.statut = statut;
    toast(`Statut mis à jour : ${statut}`, 'success');
  } catch(e) {
    toast('Erreur mise à jour statut', 'error');
  }
}

function telechargerPDF() {
  toast('Ouverture impression PDF...', 'info');
  // Ouvre un nouvel onglet avec ?print=1 qui déclenche window.print() automatiquement
  // L'utilisateur choisit "Enregistrer en PDF" dans la boîte d'impression du navigateur
  window.open(`voir-facture.html?id=${factureId}&print=1`, '_blank');
  closeAllDropdowns();
}

function envoyerMail() {
  if (!facture) return;
  const email = facture.client_email || '';
  if (!email) { toast('Aucun email client renseigné', 'error'); return; }
  const montant = fmt(facture.montant_ht || facture.montant || 0);
  const sujet = encodeURIComponent(`Facture ${facture.numero} — ${cfg?.nom || 'StarElec'}`);
  const corps = encodeURIComponent(
    `Bonjour,\n\nVeuillez trouver ci-joint la facture ${facture.numero} d'un montant de ${montant}.\n\nDate d'échéance : ${facture.date_echeance || '—'}\n\nCordialement,\n${cfg?.nom || 'StarElec'}`
  );
  window.location.href = `mailto:${email}?subject=${sujet}&body=${corps}`;
}

async function supprimerFacture() {
  if (!confirm(`Supprimer définitivement la facture ${facture?.numero} ?`)) return;
  try {
    await DB.deleteFacture(factureId);
    toast('Facture supprimée', 'info');
    setTimeout(() => window.location.href = 'factures.html', 800);
  } catch(e) {
    toast('Erreur lors de la suppression', 'error');
  }
}

function getBadgeClass(s) {
  const m = {
    'Créé':'badge-cree','Envoyé':'badge-envoye','Accepté':'badge-accepte',
    'Rejeté':'badge-rejete','Payé':'badge-paye','Payé en partie':'badge-partiel','Annulé':'badge-annule'
  };
  return m[s] || 'badge-cree';
}
</script>

</body>
</html>
